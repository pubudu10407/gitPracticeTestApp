<tr th:each="student : ${students}">
    <td th:text="${student.id}"></td>
    <td th:text="${student.firstName}"></td>
    <td th:text="${student.lastName}"></td>
    <td th:text="${student.email}"></td>
    <td>
        <a class="btn btn-outline-primary" th:href="@{/Student/edit/{id}(id=${student.id})}">
            Edit
        </a>

        <a class="btn btn-outline-danger" th:href="@{/Student/delete/{id}(id=${student.id})}">
            Delete
        </a>
