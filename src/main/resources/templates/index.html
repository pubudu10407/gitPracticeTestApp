<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>

<body>
    <h1 th:text="${title}"></h1>
    <a class="btn btn-success" style="margin: 10px 10px 10px 0;" th:href="@{Students/add}">Add Student</a>
    <table style="border-collapse: collapse; width: 100%;">
        <thead>
            <tr>
                <th style="border: 1px solid black; padding: 8px;">ID</th>
                <th style="border: 1px solid black; padding: 8px;">First Name</th>
                <th style="border: 1px solid black; padding: 8px;">Last Name</th>
                <th style="border: 1px solid black; padding: 8px;">Email</th>
                <th style="border: 1px solid black; padding: 8px;">Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.firstName}"></td>
                <td th:text="${student.lastName}"></td>
                <td th:text="${student.email}"></td>
                <td>
                    <a class="btn btn-outline-primary" th:href="@{/Student/edit/{id}(id=${student.id})}">Edit</a>
                    <a class="btn btn-outline-danger" th:href="@{/Student/delete/{id}(id=${student.id})}">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>
</body>

</html>
