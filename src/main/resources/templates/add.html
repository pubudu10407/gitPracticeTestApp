<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title th:text="${title}">Add Student</title>
</head>

<body>
    <h1 th:text="${title}"></h1>
    <form th:action="@{/saveStudent}" th:object="${student}" method="post">
        <input type="hidden" name="id" th:field="${student.id}"><br>
        <input class="form-control" type="text" name="firstName" placeholder="First Name"
            th:field="${student.firstName}"><br>
        <input class="form-control" type="text" name="lastName" placeholder="Last Name"
            th:field="${student.lastName}"><br>
        <input class="form-control" type="text" name="email" placeholder="Email" th:field="${student.email}"><br>
        <button class="btn btn-primary" type="submit" th:text="${submitText}">Add Student</button>
    </form>
</body>

</html>
